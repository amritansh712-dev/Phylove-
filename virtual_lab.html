<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codexsec | Virtual Physics Laboratory</title>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;700&family=Space+Grotesk:wght@600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    :root {
      --clr-gold: #ffd475;
      --clr-gold-dim: #c9a02a;
      --clr-blue: #a9c7ff;
      --clr-bg: #05080c;
      --clr-surface: #0e131f;
      --clr-surface-high: #161d2f;
      --clr-border: rgba(255, 255, 255, 0.08);
      --clr-text: #e5e2e1;
      --clr-text-muted: #8c9ba5;
      --sidebar-width: 320px;
      --drawer-width: 340px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--clr-bg);
      color: var(--clr-text);
      font-family: 'Hanken Grotesk', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--clr-bg);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 212, 117, 0.3);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--clr-gold);
    }

    /* Header styling */
    header {
      background: rgba(14, 19, 31, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--clr-border);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
      flex-shrink: 0;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .logo-badge {
      background: rgba(255, 212, 117, 0.12);
      border: 1px solid rgba(255, 212, 117, 0.25);
      color: var(--clr-gold);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 12px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn {
      background: transparent;
      border: 1px solid var(--clr-border);
      color: var(--clr-text);
      padding: 8px 16px;
      font-size: 13px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      font-family: 'Space Grotesk', sans-serif;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .btn-primary {
      background: var(--clr-gold);
      border-color: var(--clr-gold);
      color: #000;
      font-weight: 600;
    }

    .btn-primary:hover {
      background: var(--clr-gold-dim);
      border-color: var(--clr-gold-dim);
      color: #000;
    }

    .btn-icon {
      padding: 8px;
      border-radius: 50%;
    }

    /* Main Workspace Layout */
    .workspace-wrapper {
      display: flex;
      flex: 1;
      height: calc(100vh - 64px);
      position: relative;
      overflow: hidden;
    }

    /* Left Sidebar: Lab Directory */
    aside.sidebar {
      width: var(--sidebar-width);
      border-right: 1px solid var(--clr-border);
      background: rgba(14, 19, 31, 0.4);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 90;
      flex-shrink: 0;
    }

    aside.sidebar.collapsed {
      margin-left: calc(-1 * var(--sidebar-width));
    }

    .search-box {
      padding: 16px;
      border-bottom: 1px solid var(--clr-border);
    }

    .search-input-wrapper {
      position: relative;
      width: 100%;
    }

    .search-input-wrapper span {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--clr-text-muted);
      font-size: 18px;
    }

    .search-input {
      width: 100%;
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: 8px;
      padding: 10px 12px 10px 38px;
      color: var(--clr-text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }

    .search-input:focus {
      border-color: var(--clr-gold);
      box-shadow: 0 0 0 2px rgba(255, 212, 117, 0.15);
    }

    .lab-list-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
    }

    .chapter-group {
      margin-bottom: 20px;
    }

    .chapter-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--clr-gold);
      margin-bottom: 8px;
      padding-left: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chapter-meta {
      font-size: 9px;
      color: var(--clr-text-muted);
    }

    .lab-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 6px;
      color: var(--clr-text-muted);
      text-decoration: none;
      font-size: 13.5px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 2px;
    }

    .lab-item:hover {
      background: rgba(255, 255, 255, 0.03);
      color: var(--clr-text);
    }

    .lab-item.active {
      background: rgba(255, 212, 117, 0.08);
      color: var(--clr-gold);
      border-left: 3px solid var(--clr-gold);
      border-top-left-radius: 0;
      border-bottom-left-radius: 0;
    }

    .lab-item span.icon {
      font-size: 18px;
    }

    /* Central Panel: Workspace */
    main.workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--clr-bg);
      position: relative;
    }

    .workspace-header {
      background: rgba(14, 19, 31, 0.2);
      border-bottom: 1px solid var(--clr-border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
    }

    .workspace-title-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sidebar-toggle-btn {
      background: transparent;
      border: none;
      color: var(--clr-text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    .sidebar-toggle-btn:hover {
      color: var(--clr-text);
    }

    .active-lab-title {
      font-size: 14.5px;
      font-weight: 500;
      color: #fff;
    }

    .active-lab-path {
      font-size: 11px;
      color: var(--clr-text-muted);
      margin-left: 8px;
    }

    .workspace-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Workspace Content Area */
    .workspace-content {
      flex: 1;
      position: relative;
      width: 100%;
      height: 100%;
    }

    .lab-iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #000;
      display: none;
    }

    .lab-iframe.active {
      display: block;
    }

    /* Welcome/Default Screen */
    .welcome-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
      z-index: 10;
      background: radial-gradient(circle at center, rgba(14, 19, 31, 0.8) 0%, var(--clr-bg) 100%);
      overflow-y: auto;
    }

    .welcome-icon-wrapper {
      margin-bottom: 24px;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .welcome-icon {
      font-size: 64px;
      color: var(--clr-gold);
      text-shadow: 0 0 30px rgba(255, 212, 117, 0.35);
    }

    .welcome-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 400;
      color: #fff;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .welcome-subtitle {
      font-size: 15px;
      color: var(--clr-text-muted);
      max-width: 500px;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    /* Bento Grid for Directory */
    .welcome-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 1000px;
    }

    .chapter-card {
      background: rgba(14, 19, 31, 0.4);
      border: 1px solid var(--clr-border);
      border-radius: 12px;
      padding: 20px;
      text-align: left;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chapter-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 212, 117, 0.3);
      background: rgba(14, 19, 31, 0.7);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
    }

    .chapter-card h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chapter-card h3 span.symbol {
      color: var(--clr-gold);
    }

    .chapter-card p {
      font-size: 12.5px;
      color: var(--clr-text-muted);
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .chapter-card .lab-count {
      font-size: 11px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--clr-border);
      color: var(--clr-text);
      padding: 4px 10px;
      border-radius: 6px;
      align-self: flex-start;
      margin-top: auto;
    }

    /* Right Panel: Lab Manual Drawer */
    aside.drawer {
      width: var(--drawer-width);
      border-left: 1px solid var(--clr-border);
      background: rgba(14, 19, 31, 0.85);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), margin-right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 90;
      flex-shrink: 0;
    }

    aside.drawer.collapsed {
      margin-right: calc(-1 * var(--drawer-width));
    }

    .drawer-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--clr-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
    }

    .drawer-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--clr-gold);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .drawer-close-btn {
      background: transparent;
      border: none;
      color: var(--clr-text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
    }

    .drawer-close-btn:hover {
      color: var(--clr-text);
    }

    .drawer-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .manual-section {
      margin-bottom: 24px;
    }

    .manual-section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--clr-gold-dim);
      margin-bottom: 8px;
      border-left: 2px solid var(--clr-gold);
      padding-left: 8px;
    }

    .manual-body {
      font-size: 13.5px;
      color: var(--clr-text-muted);
      line-height: 1.6;
    }

    .manual-formula-box {
      background: rgba(255, 212, 117, 0.05);
      border: 1px solid rgba(255, 212, 117, 0.15);
      padding: 12px;
      border-radius: 6px;
      font-family: 'Space Grotesk', monospace;
      color: var(--clr-gold);
      font-size: 13.5px;
      line-height: 1.4;
      text-align: center;
      margin: 8px 0;
    }

    .manual-steps-list {
      list-style-type: decimal;
      padding-left: 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 13.5px;
      color: var(--clr-text-muted);
    }

    .manual-steps-list li::marker {
      color: var(--clr-gold);
      font-weight: 600;
    }

    /* Screen Overlay for navigation drawer from site-nav */
    .codex-content-toggle {
      display: none !important; /* Hide standard site-nav button in workspace */
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo-container">
      <span class="material-symbols-outlined logo-icon" style="color:var(--clr-gold)">science</span>
      <span class="logo-text">Codexsec</span>
      <span class="logo-badge">VIRTUAL LAB</span>
    </div>
    <div class="header-actions">
      <button class="btn" onclick="window.location.href='home_page.html'">
        <span class="material-symbols-outlined">home</span> Home
      </button>
      <button class="btn btn-primary" onclick="showDashboard()">
        <span class="material-symbols-outlined">dashboard</span> Directory
      </button>
    </div>
  </header>

  <!-- WORKSPACE WRAPPER -->
  <div class="workspace-wrapper">

    <!-- LEFT SIDEBAR: Lab Directory -->
    <aside class="sidebar" id="sidebar">
      <div class="search-box">
        <div class="search-input-wrapper">
          <span class="material-symbols-outlined">search</span>
          <input type="text" class="search-input" id="searchInput" placeholder="Search experiments..." oninput="filterLabs()">
        </div>
      </div>
      <div class="lab-list-container" id="sidebarList">
        <!-- Rendered dynamically -->
      </div>
    </aside>

    <!-- CENTER PANEL: Workspace -->
    <main class="workspace">
      <!-- Workspace Header -->
      <div class="workspace-header" id="workspaceHeader" style="display:none;">
        <div class="workspace-title-area">
          <button class="sidebar-toggle-btn" onclick="toggleSidebar()" title="Toggle Sidebar">
            <span class="material-symbols-outlined" id="sidebarIcon">menu_open</span>
          </button>
          <span class="active-lab-title" id="activeLabTitle">Select an Experiment</span>
          <span class="active-lab-path" id="activeLabPath"></span>
        </div>
        <div class="workspace-actions">
          <button class="btn btn-icon" onclick="resetActiveLab()" title="Restart Experiment">
            <span class="material-symbols-outlined">replay</span>
          </button>
          <button class="btn btn-icon" onclick="openLabPage()" title="Open Chapter Page">
            <span class="material-symbols-outlined">open_in_new</span>
          </button>
          <button class="btn btn-icon" onclick="toggleDrawer()" title="Lab Manual">
            <span class="material-symbols-outlined">menu_book</span>
          </button>
        </div>
      </div>

      <!-- Workspace Contents -->
      <div class="workspace-content" id="workspaceContent">
        <!-- Iframe container -->
        <iframe class="lab-iframe" id="labIframe"></iframe>

        <!-- Welcome/Default Landing page -->
        <div class="welcome-screen" id="welcomeScreen">
          <div class="welcome-icon-wrapper">
            <span class="material-symbols-outlined welcome-icon">cyclone</span>
          </div>
          <h1 class="welcome-title">Codexsec Virtual Laboratory</h1>
          <p class="welcome-subtitle">
            An immersive interactive physics workspace. Explore virtual experiments, verify laws, and study formulas in real-time.
          </p>
          
          <h2 class="welcome-title" style="font-size:20px; margin-bottom:20px;">Select a Laboratory Module</h2>
          <div class="welcome-grid" id="welcomeGrid">
            <!-- Rendered dynamically -->
          </div>
        </div>
      </div>
    </main>

    <!-- RIGHT PANEL: Lab Manual Drawer -->
    <aside class="drawer collapsed" id="drawer">
      <div class="drawer-header">
        <span class="drawer-title">
          <span class="material-symbols-outlined">menu_book</span> Lab Manual
        </span>
        <button class="drawer-close-btn" onclick="toggleDrawer()">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="drawer-content" id="drawerContent">
        <!-- Rendered dynamically -->
      </div>
    </aside>

  </div>

  <!-- SCRIPTS -->
  <script src="site-nav.js"></script>
  <script>
    // Embedded Experiment Manual database
    const labManuals = {
      "light": {
        "fundamentals": {
          title: "Textbook Fundamentals",
          objectives: "Review fundamental light behaviors (reflection and refraction laws).",
          formulas: "n = c / v<br>sin i / sin r = constant",
          steps: [
            "Read the textbook summaries of reflection and refraction.",
            "Observe the differences between convex and concave mirrors/lenses.",
            "Review key term definitions in the reference sheet at the bottom of the page."
          ]
        },
        "sign-convention": {
          title: "Sign Convention Playground",
          objectives: "Master Cartesian sign conventions for mirrors and lenses.",
          formulas: "All distances measured from pole/optical center.<br>Object distance (u) is always negative (-).",
          steps: [
            "Move the object slider to place the object in front of the optical center.",
            "Observe how distances (u, v, f) change signs based on Cartesian axis system.",
            "Practice identifying when the image is real (-v) or virtual (+v)."
          ]
        },
        "ray-tracker": {
          title: "Interactive Ray Tracker",
          objectives: "Trace light rays through lenses and mirrors visually.",
          formulas: "1/f = 1/v - 1/u (Lens)<br>1/f = 1/v + 1/u (Mirror)",
          steps: [
            "Drag the object's height and position sliders.",
            "Trace the three standard rays: parallel, optical center, and focal point.",
            "Verify if the generated image matches calculations."
          ]
        },
        "snell": {
          title: "Snell's Law Refraction Lab",
          objectives: "Verify Snell's Law of refraction at medium boundaries.",
          formulas: "n₁ sin i = n₂ sin r",
          steps: [
            "Adjust the angle of incidence slider.",
            "Change the refractive indices of Medium 1 and Medium 2.",
            "Calculate and verify the ratio sin(i) / sin(r) equals n₂₁."
          ]
        },
        "glass-slab": {
          title: "Glass Slab Lateral Shifter",
          objectives: "Explore lateral displacement of light passing through a rectangular glass slab.",
          formulas: "d = t * sin(i - r) / cos(r)",
          steps: [
            "Adjust the thickness of the glass slab.",
            "Change the incident angle of the light beam.",
            "Observe how lateral shift increases with thickness and angle."
          ]
        },
        "lens-power": {
          title: "Lens Power Combiner",
          objectives: "Calculate and test optical power of lens combinations.",
          formulas: "P = P₁ + P₂ + P₃...<br>P = 1 / f (meters)",
          steps: [
            "Add lenses to the combiner setup.",
            "Vary individual focal lengths (convex or concave).",
            "Observe the aggregate focal length and the combined image position."
          ]
        }
      },
      "eye": {
        "anatomy": {
          title: "The Optical Camera of the Body",
          objectives: "Explore key structures of the human eye camera system.",
          formulas: "N/A (Anatomical Structures)",
          steps: [
            "Click on the custom canvas diagram elements.",
            "Select different eye parts (Cornea, Iris, Retina, Optic Nerve).",
            "Read their primary physiological roles in the explanation panel."
          ]
        },
        "accommodation": {
          title: "Power of Accommodation",
          objectives: "Understand how ciliary muscles adjust lens focal length.",
          formulas: "f varies from 2.0 cm (maximum curvature) to 2.4 cm (flat).",
          steps: [
            "Drag the object distance slider from near (25cm) to far (infinity).",
            "Observe the ciliary muscle states (contracted vs relaxed).",
            "Observe the change in lens thickness to focus the image exactly on the retina."
          ]
        },
        "defects": {
          title: "Vision Defects",
          objectives: "Study visual defects (Myopia, Hypermetropia) and their correction.",
          formulas: "P = 100 / f (cm)<br>Concave (-D) for Myopia<br>Convex (+D) for Hypermetropia",
          steps: [
            "Select Myopia, Hypermetropia, or Presbyopia to see their focus errors.",
            "Enter a lens focal length in the calculator (e.g. -50 cm).",
            "Calculate the power in Dioptres and identify the corrective lens shape."
          ]
        },
        "prism": {
          title: "Dispersion of Light",
          objectives: "Observe dispersion of white light into VIBGYOR.",
          formulas: "D = (i₁ + i₂) - A<br>Violet bends most, Red bends least.",
          steps: [
            "Adjust the prism angle (A) slider.",
            "Vary the angle of incidence of incoming white light.",
            "Observe the changes in refraction and dispersion width."
          ]
        },
        "atmosphere": {
          title: "Atmospheric Phenomena",
          objectives: "Explain scattering and refraction in the Earth's atmosphere.",
          formulas: "Rayleigh Scattering: Intensity ∝ 1 / λ⁴",
          steps: [
            "Choose different atmospheric scenes (Blue Sky, Red Sunset, Tyndall Effect).",
            "Observe how smaller molecules scatter blue wavelengths.",
            "Observe how refraction causes early sunrise and twinkling."
          ]
        }
      },
      "electricity": {
        "current": {
          title: "Electric Current and Potential",
          objectives: "Define electric current, potential, and units.",
          formulas: "I = Q / t = n * e / t<br>V = W / Q",
          steps: [
            "Review the basic charge equations.",
            "Understand why ammeters are connected in series and voltmeters in parallel."
          ]
        },
        "ohm": {
          title: "Ohm's Law Explorer",
          objectives: "Verify Ohm's Law and measure resistance.",
          formulas: "V = I * R &nbsp;→&nbsp; I = V / R",
          steps: [
            "Vary the Voltage slider (1V to 24V).",
            "Vary the Resistance slider (1Ω to 100Ω).",
            "Observe how current changes on the indicator and watch the linear V-I plot build."
          ]
        },
        "circuits": {
          title: "Resistance Combinations",
          objectives: "Compare series and parallel circuit behaviors.",
          formulas: "Rₛ = R₁ + R₂ (Series)<br>1/Rₚ = 1/R₁ + 1/R₂ (Parallel)",
          steps: [
            "Select the Series or Parallel tab.",
            "Adjust resistance sliders (R₁ and R₂) and Voltage (V).",
            "Compare the total current and individual voltage/current shares."
          ]
        },
        "heating": {

    let activeChapter = null;
    let activeTopic = null;

    // Load initial structure
    document.addEventListener("DOMContentLoaded", () => {
      renderSidebarDirectory();
      renderDashboardGrid();
    });

    // Render left sidebar directory list
    function renderSidebarDirectory() {
      const container = document.getElementById("sidebarList");
      container.innerHTML = "";

      window.CodexSiteData.chapters.forEach(chapter => {
        const chapterDiv = document.createElement("div");
        chapterDiv.className = "chapter-group";
        chapterDiv.dataset.chapterId = chapter.id;

        const titleHeader = document.createElement("h4");
        titleHeader.className = "chapter-title";
        titleHeader.innerHTML = `<span>${chapter.title.split(":")[0]}</span> <span class="chapter-meta">${chapter.meta}</span>`;
        chapterDiv.appendChild(titleHeader);

        chapter.topics.forEach(topic => {
          const item = document.createElement("a");
          item.className = "lab-item";
          item.dataset.topicId = topic[0];
          item.dataset.search = (chapter.title + " " + topic[1]).toLowerCase();
          item.innerHTML = `<span class="material-symbols-outlined icon">explore</span> <span>${topic[1]}</span>`;
          item.onclick = () => loadLab(chapter.id, topic[0]);
          chapterDiv.appendChild(item);
        });

        container.appendChild(chapterDiv);
      });
    }

    // Render directory grid inside the welcome landing page
    function renderDashboardGrid() {
      const grid = document.getElementById("welcomeGrid");
      grid.innerHTML = "";

      window.CodexSiteData.chapters.forEach(chapter => {
        const card = document.createElement("div");
        card.className = "chapter-card";
        
        let iconSymbol = "wb_sunny";
        if (chapter.id === "eye") iconSymbol = "visibility";
        if (chapter.id === "electricity") iconSymbol = "electric_bolt";
        if (chapter.id === "magnetic") iconSymbol = "rotate_right";
        if (chapter.id === "energy") iconSymbol = "heat_pump";
        if (chapter.id === "environment") iconSymbol = "park";
        if (chapter.id === "sustainability") iconSymbol = "recycling";

        card.innerHTML = `
          <h3>${chapter.title.split(":")[0]} <span class="material-symbols-outlined symbol">${iconSymbol}</span></h3>
          <p>${chapter.title}</p>
          <span class="lab-count">${chapter.topics.length} Experiments</span>
        `;
        card.onclick = () => {
          // Open first lab of this chapter
          loadLab(chapter.id, chapter.topics[0][0]);
        };
        grid.appendChild(card);
      });
    }

    // Load selected lab in workspace
    function loadLab(chapterId, topicId) {
      activeChapter = chapterId;
      activeTopic = topicId;

      const chapter = window.CodexSiteData.chapters.find(c => c.id === chapterId);
      const topic = chapter.topics.find(t => t[0] === topicId);

      // Highlight active in sidebar
      document.querySelectorAll(".lab-item").forEach(item => {
        item.classList.toggle("active", item.dataset.topicId === topicId);
      });

      // Hide welcome screen and show headers
      document.getElementById("welcomeScreen").style.display = "none";
      document.getElementById("workspaceHeader").style.display = "flex";

      // Setup details in header
      document.getElementById("activeLabTitle").textContent = topic[1];
      document.getElementById("activeLabPath").textContent = `Class 10 / ${chapter.title.split(":")[0]}`;

      // Load Iframe
      const iframe = document.getElementById("labIframe");
      iframe.src = `${chapter.file}#${topicId}`;
      iframe.className = "lab-iframe active";

      // Load Drawer Manual
      renderLabManual(chapterId, topicId);
      
      // Auto open manual drawer when loading a lab
      document.getElementById("drawer").classList.remove("collapsed");
    }

    // Render lab manual inside the right panel drawer
    function renderLabManual(chapterId, topicId) {
      const container = document.getElementById("drawerContent");
      container.innerHTML = "";

      const manual = labManuals[chapterId]?.[topicId] || {
        title: "Experimental Guide",
        objectives: "Observe key characteristics and interact with parameters.",
        formulas: "Review formulas in the active chapter.",
        steps: [
          "Scroll or check the values in the active simulation screen.",
          "Interact with sliders, inputs, or tabs in the interactive frame.",
          "Verify the physical laws and read through textbook definitions below the lab screen."
        ]
      };

      container.innerHTML = `
        <div class="manual-section">
          <h4 class="manual-section-title">Experiment Title</h4>
          <div class="manual-body" style="font-weight: 500; color:#fff;">${manual.title}</div>
        </div>
        <div class="manual-section">
          <h4 class="manual-section-title">Learning Objectives</h4>
          <div class="manual-body">${manual.objectives}</div>
        </div>
        <div class="manual-section">
          <h4 class="manual-section-title">Key Equations</h4>
          <div class="manual-formula-box">${manual.formulas}</div>
        </div>
        <div class="manual-section">
          <h4 class="manual-section-title">Instructions</h4>
          <ol class="manual-steps-list">
            ${manual.steps.map(s => `<li>${s}</li>`).join("")}
          </ol>
        </div>
      `;
    }

    // Reset current active lab iframe
    function resetActiveLab() {
      if (activeChapter && activeTopic) {
        const iframe = document.getElementById("labIframe");
        iframe.src = iframe.src; // Reload
      }
    }

    // Open active page in a new window/tab
    function openLabPage() {
      if (activeChapter) {
        const chapter = window.CodexSiteData.chapters.find(c => c.id === activeChapter);
        window.open(`${chapter.file}#${activeTopic}`, "_blank");
      }
    }

    // Toggle Left Sidebar
    function toggleSidebar() {
      const sidebar = document.getElementById("sidebar");
      const icon = document.getElementById("sidebarIcon");
      sidebar.classList.toggle("collapsed");

      if (sidebar.classList.contains("collapsed")) {
        icon.textContent = "menu";
      } else {
        icon.textContent = "menu_open";
      }
    }

    // Toggle Right Manual Drawer
    function toggleDrawer() {
      const drawer = document.getElementById("drawer");
      drawer.classList.toggle("collapsed");
    }

    // Show Dashboard Grid
    function showDashboard() {
      // Deactivate sidebar highlights
      document.querySelectorAll(".lab-item").forEach(item => item.classList.remove("active"));
      
      // Hide workspace frame and header, show welcome landing
      document.getElementById("labIframe").className = "lab-iframe";
      document.getElementById("workspaceHeader").style.display = "none";
      document.getElementById("welcomeScreen").style.display = "flex";
      document.getElementById("drawer").classList.add("collapsed");
      activeChapter = null;
      activeTopic = null;
    }

    // Filter labs in sidebar search input
    function filterLabs() {
      const query = document.getElementById("searchInput").value.toLowerCase();
      
      document.querySelectorAll(".chapter-group").forEach(group => {
        let hasVisibleLabs = false;
        
        group.querySelectorAll(".lab-item").forEach(item => {
          const isMatch = item.dataset.search.includes(query);
          item.style.display = isMatch ? "flex" : "none";
          if (isMatch) hasVisibleLabs = true;
        });

        // Hide whole chapter section if no matches found inside it
        group.style.display = hasVisibleLabs ? "block" : "none";
      });
    }
  </script>
